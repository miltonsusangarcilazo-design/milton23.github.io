<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fuego vs Agua PRO MAX 🔥💧</title>

<style>
body { margin:0; overflow:hidden; background:#0a0a12; }
canvas { display:block; }

/* JOYSTICKS */
.joy {
    position: fixed;
    width:120px; height:120px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
}
#moveJoy { left:30px; bottom:30px; }
#jumpJoy { right:30px; bottom:30px; }

.stick {
    position:absolute;
    width:50px; height:50px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    left:35px; top:35px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="moveJoy" class="joy"><div class="stick" id="stick1"></div></div>
<div id="jumpJoy" class="joy"><div class="stick" id="stick2"></div></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.6;
let friction = 0.9;

let moveX = 0;
let jumpForce = 0;

// CAMARA
let camX = 0;

// MAPA (más largo)
let worldWidth = 2000;
let ground = canvas.height - 50;

// PERSONAJE
let p = {
    x:100, y:300,
    w:30, h:60,
    dx:0, dy:0,
    onGround:false,
    frame:0
};

// ENEMIGOS
let enemies = [
    {x:500,y:ground-40,w:40,h:40,dir:1},
    {x:900,y:ground-40,w:40,h:40,dir:-1},
    {x:1400,y:ground-40,w:40,h:40,dir:1}
];

// JOYSTICK MOVIMIENTO
let joy1 = document.getElementById("moveJoy");
joy1.addEventListener("touchmove", e=>{
    let rect = joy1.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 60;
    moveX = x/40;
});
joy1.addEventListener("touchend", ()=> moveX=0);

// JOYSTICK SALTO
let joy2 = document.getElementById("jumpJoy");
joy2.addEventListener("touchmove", e=>{
    let rect = joy2.getBoundingClientRect();
    let y = e.touches[0].clientY - rect.top - 60;
    jumpForce = -y/10;
});
joy2.addEventListener("touchend", ()=> jumpForce=0);

// UPDATE
function update(){
    p.dx += moveX * 0.5;
    p.dx *= friction;

    if (jumpForce > 1 && p.onGround){
        p.dy = -10 - jumpForce;
        p.onGround = false;
    }

    p.dy += gravity;

    p.x += p.dx;
    p.y += p.dy;

    if (p.y + p.h > ground){
        p.y = ground - p.h;
        p.dy = 0;
        p.onGround = true;
    }

    // CAMARA SIGUE
    camX = p.x - canvas.width/2;
    if(camX < 0) camX = 0;
    if(camX > worldWidth - canvas.width) camX = worldWidth - canvas.width;

    if(Math.abs(p.dx)>0.5) p.frame+=0.2;
}

// ENEMIGOS
function updateEnemies(){
    enemies.forEach(e=>{
        e.x += e.dir*2;
        if(e.x<100 || e.x>worldWidth-100) e.dir*=-1;
    });
}

// DIBUJO PERSONAJE 2D
function drawPlayer(){
    let x = p.x - camX;
    let y = p.y;

    // cabeza
    ctx.fillStyle="#ffccaa";
    ctx.beginPath();
    ctx.arc(x+15,y+10,10,0,Math.PI*2);
    ctx.fill();

    // ojos
    ctx.fillStyle="black";
    ctx.fillRect(x+10,y+8,3,3);
    ctx.fillRect(x+17,y+8,3,3);

    // cuerpo
    ctx.fillStyle="red";
    ctx.fillRect(x+10,y+20,10,25);

    // piernas animadas
    let off = Math.sin(p.frame)*5;
    ctx.fillRect(x+5,y+45+off,5,15);
    ctx.fillRect(x+20,y+45-off,5,15);

    // brazos
    ctx.fillRect(x+5,y+25,5,10);
    ctx.fillRect(x+20,y+25,5,10);
}

// ENEMIGOS 2D
function drawEnemy(e){
    let x = e.x - camX;

    ctx.fillStyle="purple";
    ctx.fillRect(x,e.y,e.w,e.h);

    // pinchos
    ctx.fillStyle="white";
    for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(x+i*8,e.y);
        ctx.lineTo(x+i*8+4,e.y-10);
        ctx.lineTo(x+i*8+8,e.y);
        ctx.fill();
    }

    // cara
    ctx.fillStyle="black";
    ctx.fillRect(x+8,e.y+10,5,5);
    ctx.fillRect(x+25,e.y+10
